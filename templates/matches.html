<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Partidos</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <video id="video-bg" autoplay muted loop playsinline>
    <source src="https://www.pexels.com/download/video/34699797/" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content matches-content">
    <a href="/" class="back-link">← Inicio</a>
    <h1 class="matches-title">World Cup 2026</h1>

    <div class="card">
      <h2>Registrar Partido</h2>
      <form method="POST" class="match-form">
        <div class="form-row">
          <div class="form-group">
            <label for="team1">Equipo 1</label>
            <input type="text" id="team1" name="team1" placeholder="ej. México" required />
          </div>
          <div class="vs-label">VS</div>
          <div class="form-group">
            <label for="team2">Equipo 2</label>
            <input type="text" id="team2" name="team2" placeholder="ej. Brasil" required />
          </div>
        </div>
        <div class="form-group">
          <label for="date">Fecha</label>
          <input type="date" id="date" name="date" required />
        </div>
        <button type="submit" class="save-btn">Guardar</button>
      </form>
    </div>

    <div class="card">
      <h2>Partidos Registrados</h2>
      {% if matches %}
        <table class="matches-table">
          <thead>
            <tr><th>#</th><th>Equipo 1</th><th></th><th>Equipo 2</th><th>Fecha</th></tr>
          </thead>
          <tbody>
            {% for m in matches %}
            <tr>
              <td>{{ loop.index }}</td>
              <td>{{ m.team1 }}</td>
              <td class="vs-cell">⚽</td>
              <td>{{ m.team2 }}</td>
              <td>{{ m.date.strftime('%d %b %Y') }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      {% else %}
        <p class="no-matches">Aún no hay partidos registrados.</p>
      {% endif %}
    </div>
  </div>
</body>
</html>
